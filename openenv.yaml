name: email-triage-env
version: "1.0.0"
description: >
  Confidence-aware autonomous email routing environment for AI agent training.
  An agent triages customer support emails by classifying category, setting
  priority, routing to the correct department, and drafting professional replies.
  Features hybrid RL with rule-based guardrails, confidence-gated routing,
  multi-dimensional reward scoring, and phishing detection challenges.

author: Krish Shah
license: MIT

tags:
  - openenv
  - email-triage
  - reinforcement-learning
  - nlp
  - customer-support

docker:
  image: email-triage-env
  port: 7860

env_vars:
  - API_BASE_URL
  - MODEL_NAME
  - HF_TOKEN

secrets:
  - HF_TOKEN

endpoints:
  health: /health
  metadata: /metadata
  schema: /schema
  reset: /reset
  step: /step
  state: /state

action_model: models.TriageAction
observation_model: models.TriageObservation
reward_model: models.TriageReward

tasks:
  - id: task1_email_classification
    name: "Email Classification"
    difficulty: easy
    max_steps: 10
    description: >
      Classify a customer support email into one of six categories:
      billing, technical, general, complaint, refund, or phishing.
      Includes disguised phishing emails that test the agent's ability
      to detect social engineering attempts.
    grader:
      type: programmatic
      score_range: [0.01, 0.99]
      dimensions:
        - classification_accuracy

  - id: task2_prioritization_routing
    name: "Prioritization & Routing"
    difficulty: medium
    max_steps: 10
    description: >
      Classify the email, assign a priority level (P1/P2/P3), and
      route to the correct department (billing_team, technical_team,
      customer_success, returns, or security). Requires understanding
      urgency signals and organizational routing rules.
    grader:
      type: programmatic
      score_range: [0.01, 0.99]
      dimensions:
        - classification_accuracy
        - priority_accuracy
        - routing_accuracy

  - id: task3_full_triage_reply
    name: "Full Triage with Draft Reply"
    difficulty: hard
    max_steps: 10
    description: >
      Complete triage including classification, prioritization, routing,
      and drafting a professional empathetic customer reply (>=100 words).
      Reply quality is evaluated for relevance, empathy, actionability,
      and phishing awareness. Includes LLM-judge scoring and repetition
      penalty.
    grader:
      type: programmatic
      score_range: [0.01, 0.99]
      dimensions:
        - classification_accuracy
        - priority_accuracy
        - routing_accuracy
        - reply_quality

action_space:
  type: structured
  fields:
    category:
      type: string
      enum: [billing, technical, general, complaint, refund, phishing]
    priority:
      type: string
      enum: [P1, P2, P3]
    department:
      type: string
      enum: [billing_team, technical_team, customer_success, returns, security]
    draft_reply:
      type: string
      nullable: true

observation_space:
  type: structured
  fields:
    email_id: string
    subject: string
    body: string
    sender: string
    task_id: integer
    task_description: string
    reward: float
    done: boolean
    feedback: string
    feature_hints:
      type: object
      fields:
        has_money_terms: boolean
        has_security_terms: boolean
        has_link: boolean
        has_urgency: boolean
        multi_intent: boolean
        difficulty: string
        persona: string
        language_variant: string

supports_concurrent_sessions: true
max_concurrent_envs: 5
